version: "3.9"

services:
  metas_db:
    image: postgres:15-alpine
    container_name: metas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metas_db
      POSTGRES_USER: metas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    volumes:
      - metas_postgres_data:/var/lib/postgresql/data
    networks:
      - metas-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metas_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Sem "ports:" propositalmente — metas_db só é alcançável pela metas-net,
    # nunca publicado no host (ao contrário do Mahatma, que expõe o 5432).

  metas_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metas_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://metas_user:${DB_PASSWORD:?defina DB_PASSWORD no .env}@metas_db:5432/metas_db
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY no .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    depends_on:
      metas_db:
        condition: service_healthy
    networks:
      - metas-net
    # Sem "ports:" — só acessível pela metas-net. O Caddy é o único ponto
    # de entrada público (via metas_frontend), então o backend não precisa
    # mais publicar porta no host.

  metas_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: metas_frontend
    restart: unless-stopped
    depends_on:
      - metas_backend
    networks:
      - metas-net
    # Sem "ports:" — acessível só pela metas-net. O Caddy (metas_caddy)
    # é quem expõe o sistema publicamente, via reverse_proxy.

  metas_caddy:
    image: caddy:2-alpine
    container_name: metas_caddy
    restart: unless-stopped
    depends_on: [metas_frontend]
    networks: [metas-net]
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - metas_caddy_data:/data
      - metas_caddy_config:/config

networks:
  metas-net:
    driver: bridge

volumes:
  metas_postgres_data:
  metas_caddy_data: {}
  metas_caddy_config: {}
